; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32@5.2.0
platform_packages =
    tool-openocd-esp32

framework = espidf

build_flags =
    -Wall
    -Wextra
    -Werror
    -D_EMBER

# libraries. We are currently not freezing at versions.
lib_deps =
    libeeprom
    ember-can
    cuber-base

lib_extra_dirs =
    ${PROJECT_DIR}/mod


# Boards #
[node1.1]
board = igvc_dbw_node
board_build.partitions = partitions_igvc.csv
upload_protocol = esp-prog
debug_tool = esp-prog

[node1.2]
board = esp32-s3-devkitc-1
board_build.partitions = partitions_igvc.csv


# Node configurations #
[env:blink2]
extends = node1.2
lib_deps =
    ${env.lib_deps}
    cuber-blink

[env:blink]
extends = node1.1
lib_deps =
    ${env.lib_deps}
    cuber-blink

[env:throttle]
extends = node1.1
lib_deps =
    ${env.lib_deps}
    cuber-throttle

[env:brake]
extends = node1.1
lib_deps =
    ${env.lib_deps}
    cuber-brake

[env:encoder]
extends = node1.1
lib_deps =
    ${env.lib_deps}
    cuber-encoder

[env:rear_encoder]
extends = node1.1
lib_deps =
    ${env.lib_deps}
    cuber-rearencoder

[env:pb_mon]
extends = node1.1
lib_deps =
    ${env.lib_deps}
    cuber-pbmon
